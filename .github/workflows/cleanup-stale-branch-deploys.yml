# KAN-238 — Scheduled cleanup of stale branch-based Vercel preview deploys.
#
# Why this exists (companion to KAN-237):
#   KAN-237's pull_request:closed trigger only catches deploys for the
#   PR's head ref. Deploys whose meta.githubCommitRef is develop /
#   staging / beta are generated by squash-merges + promotion
#   workflows, never close as PRs, and accumulate forever. Worst case:
#   beta SHA-pinned URLs point at PRODUCTION Supabase and expose the
#   /login form to the public after the KAN-82/85 closeout (BUGS-22).
#
# This workflow runs daily (and on-demand via workflow_dispatch),
# scans all Vercel deployments, and deletes anything older than
# retention_days, scoped to develop/staging/beta only. Three explicit
# carve-outs:
#   1. target == "production" → never deleted (rollback safety).
#   2. The newest deploy on each scoped branch is always kept.
#   3. Any deploy whose alias list contains a *.checklyra.com hostname
#      is never deleted — those are the live aliases for dev/stage/beta.
#
# Initial backfill plan:
#   1. workflow_dispatch with dry_run=true → review the summary.
#   2. workflow_dispatch with dry_run=false → execute.
#   3. Scheduled daily cron runs in non-dry mode from then on.

name: Cleanup stale branch deploys

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'Delete deploys older than N days (default 30)'
        required: false
        default: '30'
      dry_run:
        description: 'If true, log what would be deleted without deleting'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Compute parameters
        id: params
        env:
          INPUT_DAYS: ${{ github.event.inputs.retention_days }}
          INPUT_DRY: ${{ github.event.inputs.dry_run }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          DAYS="${INPUT_DAYS:-30}"
          DRY="${INPUT_DRY:-false}"
          if ! [[ "${DAYS}" =~ ^[0-9]+$ ]]; then
            echo "::error::retention_days must be a non-negative integer; got '${DAYS}'"
            exit 1
          fi
          if [[ "${DRY}" != "true" && "${DRY}" != "false" ]]; then
            echo "::error::dry_run must be 'true' or 'false'; got '${DRY}'"
            exit 1
          fi
          echo "days=${DAYS}" >> "$GITHUB_OUTPUT"
          echo "dry=${DRY}" >> "$GITHUB_OUTPUT"
          echo "retention_days=${DAYS}"
          echo "dry_run=${DRY}"
          echo "event=${EVENT_NAME}"

      - name: Scan + delete stale branch deploys
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          RETENTION_DAYS: ${{ steps.params.outputs.days }}
          DRY_RUN: ${{ steps.params.outputs.dry }}
        run: |
          set -euo pipefail

          if [[ -z "${VERCEL_TOKEN}" || -z "${VERCEL_ORG_ID}" || -z "${VERCEL_PROJECT_ID}" ]]; then
            echo "::error::One or more Vercel secrets are missing"
            exit 1
          fi

          # Threshold = now - retention_days * 86400000 milliseconds.
          NOW_MS=$(python3 -c "import time; print(int(time.time()*1000))")
          THRESHOLD_MS=$(python3 -c "print(${NOW_MS} - (${RETENTION_DAYS} * 86400000))")
          echo "Now: ${NOW_MS}, threshold: ${THRESHOLD_MS} (retention ${RETENTION_DAYS}d, dry_run=${DRY_RUN})"

          # Paginate through every deployment. Cap at 100 pages to prevent
          # runaway in pathological cases — 100 × 100 = 10 000 deploys.
          #
          # Implementation note: curl writes each page directly to a temp
          # file and python reads it from disk. Earlier attempts that
          # captured the response into a shell variable and interpolated
          # it into a python heredoc broke when commit messages contained
          # characters that conflicted with heredoc string-quoting (e.g.
          # apostrophes inside ${RESP}). Files-on-disk avoid every
          # quoting hazard.
          ALL_PATH=/tmp/vercel-deploys-all.json
          PAGES_DIR=/tmp/vercel-pages
          mkdir -p "${PAGES_DIR}"
          echo '[]' > "${ALL_PATH}"
          UNTIL=""
          PAGE=0
          MAX_PAGES=100
          while [[ "${PAGE}" -lt "${MAX_PAGES}" ]]; do
            PAGE=$((PAGE + 1))
            URL="https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_ORG_ID}&limit=100"
            if [[ -n "${UNTIL}" ]]; then
              URL="${URL}&until=${UNTIL}"
            fi
            PAGE_FILE="${PAGES_DIR}/page-${PAGE}.json"
            HTTP=$(curl -s -o "${PAGE_FILE}" -w '%{http_code}' \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" "${URL}") || HTTP="000"
            if [[ "${HTTP}" != "200" ]]; then
              echo "::error::Vercel API list failed on page ${PAGE} (HTTP ${HTTP})"
              exit 1
            fi
            # Merge this page into the running list + extract the page count
            # and next cursor in one python pass, never via shell interpolation.
            ALL_PATH="${ALL_PATH}" PAGE_FILE="${PAGE_FILE}" \
              python3 <<'PY' > /tmp/page-meta
          import json, os
          all_path = os.environ["ALL_PATH"]
          page_path = os.environ["PAGE_FILE"]
          with open(all_path) as f:
              acc = json.load(f)
          with open(page_path) as f:
              page = json.load(f).get("deployments", []) or []
          acc.extend(page)
          with open(all_path, "w") as f:
              json.dump(acc, f)
          count = len(page)
          oldest = min((int(d.get("createdAt", 0)) for d in page), default=0)
          next_until = oldest - 1 if (count and oldest) else ""
          print(f"{count}|{next_until}")
          PY
            META=$(cat /tmp/page-meta)
            COUNT="${META%%|*}"
            NEXT_UNTIL="${META##*|}"
            if [[ "${COUNT}" -lt 100 ]]; then
              break
            fi
            if [[ -z "${NEXT_UNTIL}" ]]; then
              break
            fi
            UNTIL="${NEXT_UNTIL}"
          done
          TOTAL=$(ALL_PATH="${ALL_PATH}" python3 -c "import json,os; print(len(json.load(open(os.environ['ALL_PATH']))))")
          echo "Total deployments scanned: ${TOTAL}"

          # Compute the deletion decision per deploy. Emits JSON lines:
          # {"id":"...", "branch":"...", "decision":"delete|keep-prod|keep-newest|keep-aliased|keep-fresh|keep-out-of-scope", "age_days":N}
          DEC_PATH=/tmp/decisions.jsonl
          python3 - <<PY > "${DEC_PATH}"
          import json
          threshold = ${THRESHOLD_MS}
          scoped_branches = {"develop", "staging", "beta"}
          with open("${ALL_PATH}") as f:
              all_deps = json.load(f)
          # Vercel's v6 /deployments list returns the unique deployment
          # identifier as "uid". Other endpoints use "id". Accept either,
          # preferring "uid" because that's what /v6 actually emits.
          def dep_id(d):
              return d.get("uid") or d.get("id")
          # Identify newest deploy per scoped branch (rollback carve-out).
          newest_per_branch = {}
          for d in all_deps:
              ref = (d.get("meta") or {}).get("githubCommitRef")
              if ref not in scoped_branches:
                  continue
              if d.get("target") == "production":
                  continue
              created = int(d.get("createdAt", 0))
              cur = newest_per_branch.get(ref)
              if cur is None or created > int(cur.get("createdAt", 0)):
                  newest_per_branch[ref] = d
          newest_ids = {dep_id(v) for v in newest_per_branch.values() if dep_id(v)}

          for d in all_deps:
              meta = d.get("meta") or {}
              ref = meta.get("githubCommitRef")
              created = int(d.get("createdAt", 0))
              age_days = max(0, ( ${NOW_MS} - created) // 86400000)
              this_id = dep_id(d)
              decision = None
              if d.get("target") == "production":
                  decision = "keep-prod"
              elif ref not in scoped_branches:
                  decision = "keep-out-of-scope"
              elif this_id in newest_ids:
                  decision = "keep-newest"
              else:
                  aliases = d.get("alias") or []
                  if any(a.endswith(".checklyra.com") for a in aliases):
                      decision = "keep-aliased"
                  elif created > threshold:
                      decision = "keep-fresh"
                  else:
                      decision = "delete"
              print(json.dumps({
                  "id": this_id,
                  "branch": ref or "(none)",
                  "target": d.get("target"),
                  "decision": decision,
                  "age_days": age_days,
                  "url": d.get("url"),
              }))
          PY

          # Summary tally.
          echo ""
          echo "## Cleanup summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Retention window: ${RETENTION_DAYS} days" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry run: ${DRY_RUN}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total deployments scanned: ${TOTAL}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Decisions" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Decision | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json, collections
          counts = collections.Counter()
          for line in open('${DEC_PATH}'):
              counts[json.loads(line)['decision']] += 1
          for k in ('delete','keep-newest','keep-aliased','keep-fresh','keep-prod','keep-out-of-scope'):
              print(f'| {k} | {counts.get(k, 0)} |')
          " >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Execute deletes (or log if dry_run).
          DELETED=0
          FAILED=0
          SCHEDULED=$(python3 -c "
          import json
          n = 0
          for line in open('${DEC_PATH}'):
              if json.loads(line)['decision'] == 'delete':
                  n += 1
          print(n)
          ")
          echo "Scheduled for deletion: ${SCHEDULED}"

          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "::warning::dry_run=true — no deletions will be performed"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Sample of would-delete (first 25)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| branch | age days | id | url |" >> "$GITHUB_STEP_SUMMARY"
            echo "| --- | --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"
            python3 -c "
          import json
          shown = 0
          for line in open('${DEC_PATH}'):
              r = json.loads(line)
              if r['decision'] != 'delete':
                  continue
              if shown >= 25:
                  break
              print(f\"| {r['branch']} | {r['age_days']} | {r['id']} | {r['url']} |\")
              shown += 1
          " >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Live mode — execute deletes.
          while IFS= read -r line; do
            DECISION=$(echo "${line}" | python3 -c "import json,sys; print(json.loads(sys.stdin.read())['decision'])")
            if [[ "${DECISION}" != "delete" ]]; then
              continue
            fi
            ID=$(echo "${line}" | python3 -c "import json,sys; print(json.loads(sys.stdin.read())['id'])")
            HTTP=$(curl -s -o /tmp/del_resp -w '%{http_code}' \
              -X DELETE \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v13/deployments/${ID}?teamId=${VERCEL_ORG_ID}") || HTTP="000"
            if [[ "${HTTP}" == "200" || "${HTTP}" == "202" || "${HTTP}" == "204" ]]; then
              DELETED=$((DELETED + 1))
            else
              echo "::error::Failed to delete ${ID} (HTTP ${HTTP}): $(cat /tmp/del_resp 2>/dev/null || echo '<no body>')"
              FAILED=$((FAILED + 1))
            fi
          done < "${DEC_PATH}"

          echo ""
          echo "Live cleanup: ${DELETED} deleted, ${FAILED} failed (of ${SCHEDULED} scheduled)"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Live deletes: ${DELETED}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Failed deletes: ${FAILED}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${FAILED}" -gt 0 ]]; then
            echo "::error::${FAILED} deployment(s) failed to delete"
            exit 1
          fi
