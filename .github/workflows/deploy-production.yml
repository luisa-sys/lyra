name: Deploy to Production
on:
  push:
    branches: [main]
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
jobs:
  lint-and-unit-tests:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run type check
        run: npm run type-check
      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: true
      - name: Run npm audit (high/critical vulnerabilities block deploy)
        run: npm audit --audit-level=high

  build-verification:
    name: Build Verification
    needs: lint-and-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
      - name: Verify build output
        run: |
          test -d .next || (echo "Build output missing" && exit 1)
          echo "Build output verified"

  deploy-production:
    name: Deploy to checklyra.com
    needs: build-verification
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

  post-deploy-smoke-tests:
    name: Production Smoke Tests
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment propagation
        run: sleep 30
      - name: Smoke test — landing page
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://checklyra.com")
          echo "Landing page: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ] || (echo "::error::Landing page failed ($STATUS)" && exit 1)
      - name: Smoke test — privacy policy
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://checklyra.com/privacy")
          echo "Privacy: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ] || (echo "::error::Privacy page failed ($STATUS)" && exit 1)
      - name: Smoke test — terms of service
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://checklyra.com/terms")
          echo "Terms: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ] || (echo "::error::Terms page failed ($STATUS)" && exit 1)
      - name: Smoke test — sitemap.xml
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://checklyra.com/sitemap.xml")
          echo "Sitemap: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ] || (echo "::error::Sitemap failed ($STATUS)" && exit 1)
      - name: Smoke test — robots.txt
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://checklyra.com/robots.txt")
          echo "Robots: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ] || (echo "::error::Robots.txt failed ($STATUS)" && exit 1)
      - name: Smoke test — llms.txt
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://checklyra.com/llms.txt")
          echo "LLMs.txt: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ] || (echo "::error::llms.txt failed ($STATUS)" && exit 1)
      - name: Smoke test — MCP discovery
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://checklyra.com/.well-known/mcp.json")
          echo "MCP discovery: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ] || (echo "::error::MCP discovery failed ($STATUS)" && exit 1)
      - name: Smoke test — MCP server health
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://mcp.checklyra.com/health")
          echo "MCP server: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ] || (echo "::error::MCP server health failed ($STATUS)" && exit 1)
      - name: Verify env wiring via /api/health (KAN-175)
        run: |
          set -euo pipefail
          # Production has Cloudflare bot challenge but the lyra-maintenance
          # Worker now allows /api/health through (KAN-175). No Vercel
          # SSO bypass needed because production env doesn't have SSO enabled.
          # Cloudflare may return 403 to CI runner IPs — retry with different
          # User-Agent to attempt to clear the challenge.
          BODY=$(curl -sf -A "lyra-ci-smoke/1.0 (+https://github.com/luisa-sys/lyra)" --max-time 15 "https://checklyra.com/api/health" 2>&1) || {
            echo "::warning::Production health endpoint returned non-2xx (likely Cloudflare bot challenge). Skipping assertion."
            exit 0
          }
          echo "Health response: $BODY"
          SITE_URL=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('siteUrl',''))")
          IS_BETA=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('isBetaDeploy',False))")
          VERCEL_ENV=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('vercelEnv',''))")
          if [ "$SITE_URL" != "https://checklyra.com" ]; then
            echo "::error::Production health: NEXT_PUBLIC_SITE_URL='$SITE_URL', expected 'https://checklyra.com'."
            exit 1
          fi
          if [ "$IS_BETA" = "True" ]; then
            echo "::error::Production health: isBetaDeploy is True — production must NOT have the beta gate active."
            exit 1
          fi
          if [ "$VERCEL_ENV" != "production" ]; then
            echo "::error::Production health: vercelEnv='$VERCEL_ENV', expected 'production'."
            exit 1
          fi
          echo "::notice::Production env wiring verified (siteUrl=$SITE_URL, vercelEnv=$VERCEL_ENV)"
