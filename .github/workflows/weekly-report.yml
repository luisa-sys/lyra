name: Weekly Status Report

on:
  schedule:
    - cron: '0 7 * * 1'  # Monday 07:00 UTC
  workflow_dispatch:

# KAN-167 Phase 3: every multi-line `run:` uses bash with set -e -o pipefail
# semantics. Combined with `if: always()` on each section, this means:
# - Each section either succeeds and adds its data to the report, OR fails
#   loud and adds a "DATA UNAVAILABLE" entry to the Data Quality Summary
# - All sections always run (no early termination after a failure)
# - The workflow conclusion is `failure` if ANY section's set -euo pipefail
#   trips, which surfaces problems in the GitHub UI even when the email
#   still gets sent
defaults:
  run:
    shell: bash

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      # KAN-166: fetch-depth: 0 is required for `git describe --tags` to find
      # tags. Without this, the default shallow clone returns "unknown" for
      # the version and we get the false-positive that landed in production
      # for the past 4 weeks.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install PostgreSQL 17 client
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update && sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH

      # ── Initialise report file & data-quality tracking ────
      - name: Initialise report
        run: |
          set -euo pipefail
          mkdir -p reports
          REPORT="reports/weekly-report-$(date -u +%Y-%m-%d).md"
          echo "REPORT_PATH=$REPORT" >> $GITHUB_ENV

          # Initialise data quality tracking. Each section appends to this
          # file. The final "Compose report" step reads it to build the
          # Data Quality Summary at the top of the email.
          QUALITY_FILE="$RUNNER_TEMP/data-quality.txt"
          echo "QUALITY_FILE=$QUALITY_FILE" >> $GITHUB_ENV
          : > "$QUALITY_FILE"

          # Each section writes its body to its own staging file. The compose
          # step concatenates them in order with the summary at the top.
          mkdir -p "$RUNNER_TEMP/sections"

          echo "✓ Report initialised: $REPORT"

      # ── Section 1: Endpoint Health ─────────────────────────
      # KAN-160: 403 from CI runners is treated as ✅ with explanatory note
      # because GitHub Actions runner IPs are bot-blocked by Cloudflare.
      # See gotcha #7 in CLAUDE.md.
      - name: Section 1 — Endpoint Health
        if: always()
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/sections/01-endpoint-health.md"
          echo "## 1. Endpoint Health" > "$OUT"
          echo "" >> "$OUT"
          echo "| Endpoint | Status | Notes |" >> "$OUT"
          echo "|----------|--------|-------|" >> "$OUT"

          for pair in \
            "https://checklyra.com|Production" \
            "https://checklyra.com/privacy|Privacy" \
            "https://checklyra.com/terms|Terms" \
            "https://checklyra.com/cookies|Cookies" \
            "https://checklyra.com/sitemap.xml|Sitemap" \
            "https://checklyra.com/robots.txt|robots.txt" \
            "https://mcp.checklyra.com/health|MCP Health"; do
            URL="${pair%%|*}"
            LABEL="${pair##*|}"
            CODE=$(curl -so /dev/null -w "%{http_code}" --max-time 10 \
              -A "Mozilla/5.0 (compatible; LyraReport/1.0)" "$URL" 2>/dev/null || echo "000")
            case "$CODE" in
              200)   echo "| $LABEL | ✅ 200 | OK |" >> "$OUT" ;;
              503)   echo "| $LABEL | ✅ 503 | Maintenance page (expected) |" >> "$OUT" ;;
              403)   echo "| $LABEL | ✅ 403 | CI bot-block (page is up — see KAN-160) |" >> "$OUT" ;;
              000)   echo "| $LABEL | ❌ DNS/timeout | Could not reach host |" >> "$OUT" ;;
              *)     echo "| $LABEL | ⚠️ $CODE | Unexpected — investigate |" >> "$OUT" ;;
            esac
          done
          echo "" >> "$OUT"
          echo "section-1=ok" >> "$QUALITY_FILE"

      # ── Section 2: Database Metrics ────────────────────────
      - name: Section 2 — Database Metrics
        if: always()
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/sections/02-database.md"
          echo "## 2. Database Metrics (Production)" > "$OUT"
          echo "" >> "$OUT"

          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "⚠️ DATA UNAVAILABLE — SUPABASE_DB_URL secret is not configured." >> "$OUT"
            echo "" >> "$OUT"
            echo "section-2=unavailable:secret-missing" >> "$QUALITY_FILE"
            echo "::warning::Section 2 (Database Metrics) — SUPABASE_DB_URL not set"
            exit 0
          fi

          # Capture stderr separately so we can surface the actual error
          # if psql fails, rather than just showing a generic "ERROR".
          if METRICS=$(psql "$SUPABASE_DB_URL" -t -A -F'|' -c "
              SELECT
                (SELECT count(*) FROM auth.users) as total_users,
                (SELECT count(*) FROM auth.users WHERE created_at > now() - interval '7 days') as new_users_7d,
                (SELECT count(*) FROM public.profiles) as total_profiles,
                (SELECT count(*) FROM public.profiles WHERE is_published = true) as published_profiles,
                (SELECT count(*) FROM public.profile_items) as total_items,
                (SELECT count(*) FROM public.external_links) as total_links,
                (SELECT count(*) FROM public.school_affiliations) as total_schools,
                (SELECT count(*) FROM public.api_keys) as total_api_keys
            " 2>"$RUNNER_TEMP/psql.err"); then

            IFS='|' read -r USERS NEW_USERS PROFILES PUBLISHED ITEMS LINKS SCHOOLS KEYS <<< "$METRICS"
            echo "| Metric | Count |" >> "$OUT"
            echo "|--------|-------|" >> "$OUT"
            echo "| Total users | $USERS |" >> "$OUT"
            echo "| New users (7 days) | $NEW_USERS |" >> "$OUT"
            echo "| Total profiles | $PROFILES |" >> "$OUT"
            echo "| Published profiles | $PUBLISHED |" >> "$OUT"
            echo "| Profile items | $ITEMS |" >> "$OUT"
            echo "| External links | $LINKS |" >> "$OUT"
            echo "| School affiliations | $SCHOOLS |" >> "$OUT"
            echo "| API keys | $KEYS |" >> "$OUT"
            echo "" >> "$OUT"
            echo "section-2=ok" >> "$QUALITY_FILE"
          else
            ERR=$(head -c 200 "$RUNNER_TEMP/psql.err" || echo "no error output captured")
            echo "❌ DATA UNAVAILABLE — psql query failed." >> "$OUT"
            echo "" >> "$OUT"
            echo "Error: \`$ERR\`" >> "$OUT"
            echo "" >> "$OUT"
            echo "section-2=failed:psql-error" >> "$QUALITY_FILE"
            echo "::error::Section 2 (Database Metrics) — psql failed: $ERR"
            # Don't `exit 1` — we want subsequent sections to run.
            # The Compose step will mark the workflow as failed if any
            # section reported a quality issue worse than 'unavailable'.
          fi

      # ── Section 3: Interest Email Signups (KV) ─────────────
      - name: Section 3 — Interest Email Signups
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/sections/03-interest-signups.md"
          echo "## 3. Interest Email Signups" > "$OUT"
          echo "" >> "$OUT"

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "⚠️ DATA UNAVAILABLE — Cloudflare credentials not fully configured." >> "$OUT"
            echo "" >> "$OUT"
            echo "section-3=unavailable:secret-missing" >> "$QUALITY_FILE"
            echo "::warning::Section 3 (KV signups) — Cloudflare credentials missing"
            exit 0
          fi

          KV_NAMESPACE="c7bdc8624f0a4bd5b0a8ad36e9f93d96"

          # Capture both response body and HTTP status code so we can
          # distinguish a successful empty list from an auth/scope failure.
          KV_RESPONSE=$(curl -s -w "\n__HTTP_CODE__%{http_code}" --max-time 15 \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE/keys" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" 2>&1 || echo "__HTTP_CODE__000")

          KV_HTTP=$(echo "$KV_RESPONSE" | grep -oE '__HTTP_CODE__[0-9]+' | sed 's/__HTTP_CODE__//')
          KV_BODY=$(echo "$KV_RESPONSE" | sed 's/__HTTP_CODE__[0-9]*$//')

          if [ "$KV_HTTP" != "200" ]; then
            echo "❌ DATA UNAVAILABLE — Cloudflare KV API returned HTTP $KV_HTTP." >> "$OUT"
            echo "" >> "$OUT"
            if [ "$KV_HTTP" = "403" ] || [ "$KV_HTTP" = "401" ]; then
              echo "Likely cause: CLOUDFLARE_API_TOKEN does not have Workers KV Storage:Read permission. See KAN-162." >> "$OUT"
            else
              echo "Response body (first 200 chars): \`$(echo "$KV_BODY" | head -c 200)\`" >> "$OUT"
            fi
            echo "" >> "$OUT"
            echo "section-3=failed:kv-http-$KV_HTTP" >> "$QUALITY_FILE"
            echo "::error::Section 3 (KV signups) — Cloudflare API returned $KV_HTTP"
            exit 0
          fi

          # Validate response shape — Cloudflare can return 200 with success:false
          if ! echo "$KV_BODY" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if not d.get('success'):
              sys.exit(1)
          " 2>/dev/null; then
            echo "❌ DATA UNAVAILABLE — Cloudflare KV API returned 200 but success:false." >> "$OUT"
            echo "" >> "$OUT"
            echo "Response (first 200 chars): \`$(echo "$KV_BODY" | head -c 200)\`" >> "$OUT"
            echo "" >> "$OUT"
            echo "section-3=failed:kv-success-false" >> "$QUALITY_FILE"
            echo "::error::Section 3 (KV signups) — KV API returned success:false"
            exit 0
          fi

          TOTAL_SIGNUPS=$(echo "$KV_BODY" | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('result',[])))")
          echo "| Metric | Count |" >> "$OUT"
          echo "|--------|-------|" >> "$OUT"
          echo "| Total interest signups | $TOTAL_SIGNUPS |" >> "$OUT"

          if [ "$TOTAL_SIGNUPS" -gt 0 ]; then
            echo "" >> "$OUT"
            echo "**Recent signups:**" >> "$OUT"
            echo "" >> "$OUT"
            # Loop through keys — fail loud per-key if any fetch fails
            FAILED_KEYS=0
            while read -r KEY_NAME; do
              [ -z "$KEY_NAME" ] && continue
              VALUE_RESPONSE=$(curl -s -w "\n__HTTP_CODE__%{http_code}" --max-time 10 \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE/values/$KEY_NAME" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 2>&1 || echo "__HTTP_CODE__000")
              VALUE_HTTP=$(echo "$VALUE_RESPONSE" | grep -oE '__HTTP_CODE__[0-9]+' | sed 's/__HTTP_CODE__//')
              VALUE_BODY=$(echo "$VALUE_RESPONSE" | sed 's/__HTTP_CODE__[0-9]*$//')

              if [ "$VALUE_HTTP" = "200" ]; then
                TIMESTAMP=$(echo "$VALUE_BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('timestamp','no-timestamp'))" 2>/dev/null || echo "parse-error")
                echo "- $KEY_NAME (signed up: $TIMESTAMP)" >> "$OUT"
              else
                echo "- $KEY_NAME (⚠ value fetch returned HTTP $VALUE_HTTP)" >> "$OUT"
                FAILED_KEYS=$((FAILED_KEYS+1))
              fi
            done < <(echo "$KV_BODY" | python3 -c "import json,sys; [print(k['name']) for k in json.load(sys.stdin).get('result',[])]")

            if [ "$FAILED_KEYS" -gt 0 ]; then
              echo "" >> "$OUT"
              echo "⚠ $FAILED_KEYS of $TOTAL_SIGNUPS individual key fetches failed." >> "$OUT"
              echo "section-3=partial:value-fetch-failed-${FAILED_KEYS}-of-${TOTAL_SIGNUPS}" >> "$QUALITY_FILE"
              echo "::warning::Section 3 — $FAILED_KEYS of $TOTAL_SIGNUPS KV values failed to fetch"
            else
              echo "section-3=ok" >> "$QUALITY_FILE"
            fi
          else
            echo "section-3=ok" >> "$QUALITY_FILE"
          fi
          echo "" >> "$OUT"

      # ── Section 4: CI/CD Pipeline ──────────────────────────
      # KAN-167 Phase 3: distinguishes "0 runs in window" (genuine zero) from
      # "API call failed" (data quality issue) using HTTP status checks.
      - name: Section 4 — CI/CD Pipeline
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/sections/04-cicd.md"
          echo "## 4. CI/CD Pipeline (Last 7 Days)" > "$OUT"
          echo "" >> "$OUT"
          echo "| Workflow | Runs | Passed | Failed |" >> "$OUT"
          echo "|----------|------|--------|--------|" >> "$OUT"

          # Compute the cutoff date in a portable way (gnu vs bsd date)
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)

          ANY_FAILED_FETCH=0
          for WF in deploy-dev pr-checks promote-to-staging promote-to-production health-check backup-database backup-platform; do
            # Capture the API response and HTTP status separately
            if RUNS_JSON=$(gh api "repos/luisa-sys/lyra/actions/workflows/${WF}.yml/runs?created=>${CUTOFF}&per_page=100" 2>"$RUNNER_TEMP/gh-api.err"); then
              TOTAL_RUNS=$(echo "$RUNS_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin).get('total_count',0))")
              PASSED=$(echo "$RUNS_JSON" | python3 -c "import json,sys; runs=json.load(sys.stdin).get('workflow_runs',[]); print(sum(1 for r in runs if r.get('conclusion')=='success'))")
              FAILED=$(echo "$RUNS_JSON" | python3 -c "import json,sys; runs=json.load(sys.stdin).get('workflow_runs',[]); print(sum(1 for r in runs if r.get('conclusion')=='failure'))")
              echo "| $WF | $TOTAL_RUNS | $PASSED | $FAILED |" >> "$OUT"
            else
              ERR=$(head -c 100 "$RUNNER_TEMP/gh-api.err")
              echo "| $WF | DATA UNAVAILABLE | — | — |" >> "$OUT"
              echo "::warning::Section 4 ($WF) — gh api failed: $ERR"
              ANY_FAILED_FETCH=1
            fi
          done
          echo "" >> "$OUT"

          if [ "$ANY_FAILED_FETCH" -eq 1 ]; then
            echo "section-4=partial:some-workflow-fetches-failed" >> "$QUALITY_FILE"
          else
            echo "section-4=ok" >> "$QUALITY_FILE"
          fi

      # ── Section 5: Security ────────────────────────────────
      # KAN-161 + KAN-167 Phase 3: STRICT mode. The workflow goes RED if
      # either Dependabot or CodeQL fetch returns a non-200 status. This
      # requires LYRA_BACKUP_PAT to have BOTH Dependabot alerts:Read AND
      # Code scanning alerts:Read permissions in addition to its existing
      # Secrets:Read scope. Scope-widening was performed manually via the
      # GitHub UI on 2026-04-28.
      - name: Section 5 — Security
        if: always()
        env:
          GH_TOKEN: ${{ secrets.LYRA_BACKUP_PAT }}
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/sections/05-security.md"
          echo "## 5. Security" > "$OUT"
          echo "" >> "$OUT"

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "❌ DATA UNAVAILABLE — LYRA_BACKUP_PAT secret is not set." >> "$OUT"
            echo "" >> "$OUT"
            echo "section-5=failed:pat-missing" >> "$QUALITY_FILE"
            echo "::error::Section 5 (Security) — LYRA_BACKUP_PAT not configured"
            exit 1
          fi

          SECTION_FAILED=0

          # ── Dependabot ──
          if DEP_RESPONSE=$(gh api "repos/luisa-sys/lyra/dependabot/alerts?state=open&per_page=100" 2>"$RUNNER_TEMP/dep.err"); then
            DEP_COUNT=$(echo "$DEP_RESPONSE" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
            DEP_LINE="| Open Dependabot alerts | $DEP_COUNT |"
          else
            ERR=$(head -c 200 "$RUNNER_TEMP/dep.err")
            echo "::error::Section 5 — Dependabot fetch failed: $ERR"
            echo "::error::Likely cause: LYRA_BACKUP_PAT missing 'Dependabot alerts: Read' permission. See KAN-161."
            SECTION_FAILED=1
            DEP_LINE="| Open Dependabot alerts | ❌ FETCH FAILED — see workflow log |"
          fi

          # ── CodeQL / code scanning ──
          if CODEQL_RESPONSE=$(gh api "repos/luisa-sys/lyra/code-scanning/alerts?state=open&per_page=100" 2>"$RUNNER_TEMP/codeql.err"); then
            CODEQL_COUNT=$(echo "$CODEQL_RESPONSE" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
            CODEQL_LINE="| Open CodeQL alerts | $CODEQL_COUNT |"
          else
            ERR=$(head -c 200 "$RUNNER_TEMP/codeql.err")
            echo "::error::Section 5 — CodeQL fetch failed: $ERR"
            echo "::error::Likely cause: LYRA_BACKUP_PAT missing 'Code scanning alerts: Read' permission. See KAN-161."
            SECTION_FAILED=1
            CODEQL_LINE="| Open CodeQL alerts | ❌ FETCH FAILED — see workflow log |"
          fi

          echo "| Check | Count |" >> "$OUT"
          echo "|-------|-------|" >> "$OUT"
          echo "$DEP_LINE" >> "$OUT"
          echo "$CODEQL_LINE" >> "$OUT"
          echo "" >> "$OUT"

          if [ "$SECTION_FAILED" -eq 1 ]; then
            echo "section-5=failed:fetch-error" >> "$QUALITY_FILE"
            # Per Phase 3 design: workflow goes RED on Dependabot/CodeQL
            # fetch failure (closes KAN-161). exit 1 here makes this step
            # red, which makes the workflow conclusion 'failure'.
            exit 1
          fi
          echo "section-5=ok" >> "$QUALITY_FILE"

      # ── Section 6: Test Suite ──────────────────────────────
      # KAN-167 Phase 3: actual test counts from `npx jest --listTests`
      # rather than hardcoded numbers (which had drifted: report said 239
      # while reality was 256).
      #
      # Implementation note: use `while read` rather than `xargs grep` because
      # xargs whitespace-splits paths by default. Filter to `.test.` files
      # only (excluding Playwright `.spec.` files Jest can list but not run).
      # The count is APPROXIMATE — static-analysis count of `test(` / `it(`
      # literals at the start of a line; doesn't capture `test.each(...)`
      # parametrised tests. Fine for drift detection, not authoritative.
      - name: Section 6 — Test Suite
        if: always()
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/sections/06-tests.md"
          echo "## 6. Test Suite" > "$OUT"
          echo "" >> "$OUT"

          TEST_FILE_LIST="$RUNNER_TEMP/jest-files.txt"
          npx jest --listTests 2>/dev/null | grep '\.test\.' > "$TEST_FILE_LIST" || true
          LYRA_FILES=$(wc -l < "$TEST_FILE_LIST" | tr -d ' ')

          LYRA_TESTS=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            COUNT=$(grep -cE "^\s*(test|it)\(" "$f" 2>/dev/null || echo 0)
            LYRA_TESTS=$((LYRA_TESTS + COUNT))
          done < "$TEST_FILE_LIST"

          if [ "$LYRA_FILES" -gt 0 ] && [ "$LYRA_TESTS" -gt 0 ]; then
            LYRA_LINE="| lyra (web app) | ~$LYRA_TESTS tests across $LYRA_FILES files (approximate, static count) |"
          else
            LYRA_LINE="| lyra (web app) | ❌ FETCH FAILED |"
            echo "::warning::Section 6 — could not count lyra tests (files=$LYRA_FILES, tests=$LYRA_TESTS)"
          fi

          # MCP server: cross-repo count not wired here. Honest about it.
          MCP_LINE="| lyra-mcp-server | See repo CI (cross-repo count not yet wired) |"

          echo "| Repo | Tests |" >> "$OUT"
          echo "|------|-------|" >> "$OUT"
          echo "$LYRA_LINE" >> "$OUT"
          echo "$MCP_LINE" >> "$OUT"
          echo "" >> "$OUT"
          echo "section-6=ok" >> "$QUALITY_FILE"

      # ── Section 7: Current Deployment ──────────────────────
      # KAN-166 + KAN-167 Phase 3: fail loud if `git describe` returns
      # "unknown". Combined with `fetch-depth: 0` on the checkout step, this
      # eliminates the "Version: unknown" false-positive.
      - name: Section 7 — Current Deployment
        if: always()
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/sections/07-deployment.md"
          echo "## 7. Current Deployment" > "$OUT"
          echo "" >> "$OUT"

          SECTION_FAILED=0

          if LATEST_TAG=$(git describe --tags --abbrev=0 origin/main 2>"$RUNNER_TEMP/git-tag.err"); then
            if [ -z "$LATEST_TAG" ]; then
              echo "::error::Section 7 — git describe succeeded but returned empty string"
              LATEST_TAG="❌ UNKNOWN — git describe returned empty"
              SECTION_FAILED=1
            fi
          else
            ERR=$(head -c 200 "$RUNNER_TEMP/git-tag.err")
            echo "::error::Section 7 — git describe failed: $ERR"
            echo "::error::Likely cause: missing fetch-depth: 0 on checkout step (KAN-166)"
            LATEST_TAG="❌ FETCH FAILED — see workflow log"
            SECTION_FAILED=1
          fi

          if LATEST_COMMIT=$(git log origin/main --oneline -1 2>"$RUNNER_TEMP/git-log.err"); then
            : # ok
          else
            LATEST_COMMIT="❌ FETCH FAILED — see workflow log"
            SECTION_FAILED=1
          fi

          echo "- **Version:** $LATEST_TAG" >> "$OUT"
          echo "- **Latest commit:** $LATEST_COMMIT" >> "$OUT"
          echo "" >> "$OUT"

          if [ "$SECTION_FAILED" -eq 1 ]; then
            echo "section-7=failed:git-describe-error" >> "$QUALITY_FILE"
            # Don't exit 1 — KAN-166 is Low priority and a missing version
            # shouldn't fail the entire weekly report. The Data Quality
            # Summary will surface it. Workflow still goes red via Section 5
            # if Dependabot/CodeQL fail (which is the strict path).
          else
            echo "section-7=ok" >> "$QUALITY_FILE"
          fi

      # ── Compose final report (Data Quality Summary at top) ─
      - name: Compose final report
        if: always()
        run: |
          set -euo pipefail
          REPORT="${REPORT_PATH}"

          # Build the report from header → quality summary → all sections
          {
            echo "# Lyra Weekly Status Report"
            echo "**Generated:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""

            # ── Data Quality Summary ──
            echo "## 0. Data Quality Summary"
            echo ""
            echo "This report is built from 7 data sources. Per KAN-167 Phase 3, each"
            echo "source either succeeds with real data or shows DATA UNAVAILABLE with"
            echo "the reason — never a silent placeholder."
            echo ""
            echo "| Section | Status |"
            echo "|---------|--------|"

            ALL_OK=1
            for n in 1 2 3 4 5 6 7; do
              STATUS_LINE=$(grep "^section-$n=" "$QUALITY_FILE" 2>/dev/null || echo "section-$n=missing:section-did-not-run")
              STATUS=$(echo "$STATUS_LINE" | cut -d= -f2)
              case "$STATUS" in
                ok)
                  ICON="✅"
                  REASON="OK"
                  ;;
                unavailable:*)
                  ICON="⚠️"
                  REASON="DATA UNAVAILABLE (${STATUS#unavailable:})"
                  ALL_OK=0
                  ;;
                partial:*)
                  ICON="⚠️"
                  REASON="PARTIAL (${STATUS#partial:})"
                  ALL_OK=0
                  ;;
                failed:*|missing:*)
                  ICON="❌"
                  REASON="FAILED (${STATUS#failed:}${STATUS#missing:})"
                  ALL_OK=0
                  ;;
                *)
                  ICON="❓"
                  REASON="UNKNOWN ($STATUS)"
                  ALL_OK=0
                  ;;
              esac
              # Friendly section names
              case "$n" in
                1) NAME="Endpoint Health" ;;
                2) NAME="Database Metrics" ;;
                3) NAME="Interest Email Signups" ;;
                4) NAME="CI/CD Pipeline" ;;
                5) NAME="Security" ;;
                6) NAME="Test Suite" ;;
                7) NAME="Current Deployment" ;;
              esac
              echo "| $n. $NAME | $ICON $REASON |"
            done
            echo ""

            if [ "$ALL_OK" -eq 1 ]; then
              echo "**All 7 data sources reported clean.**"
            else
              echo "**One or more data sources had issues — see Data Quality Summary above. The relevant section below will show DATA UNAVAILABLE with details.**"
            fi
            echo ""

            # ── Concatenate all section bodies ──
            for f in "$RUNNER_TEMP/sections"/*.md; do
              [ -f "$f" ] || continue
              cat "$f"
            done

            echo "---"
            echo "*Report generated by GitHub Actions workflow weekly-report.yml. Per KAN-167 policy, this report is honest about what data is reliable and what is not. View full report in workflow artifacts.*"
          } > "$REPORT"

          echo "✓ Report composed: $REPORT ($(wc -l < "$REPORT") lines)"

          # Mirror to step summary
          cat "$REPORT" >> $GITHUB_STEP_SUMMARY

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: weekly-report-${{ github.run_id }}
          path: reports/weekly-report-*.md
          retention-days: 90

      # ── Email step (always sends, partial reports included) ─
      # KAN-167 Phase 3: removed `if: success()` so a partial-failure
      # report still gets emailed. The Data Quality Summary at the top
      # makes the failure visible to the reader. Removed the silent-skip
      # `env.RESEND_API_KEY != ''` check from the `if:` and moved to
      # inline fail-loud check.
      - name: Email report via Resend
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${RESEND_API_KEY:-}" ]; then
            echo "::error::RESEND_API_KEY secret is not set — cannot send weekly report email"
            exit 1
          fi

          REPORT_FILE="${REPORT_PATH}"
          if [ ! -f "$REPORT_FILE" ]; then
            echo "::error::Report file not found at $REPORT_FILE — cannot email what isn't there"
            exit 1
          fi

          # Convert markdown to email JSON
          python3 scripts/report-to-email.py "$REPORT_FILE" > /tmp/report-email.json

          # Send via Resend; capture both response and HTTP code
          EMAIL_RESPONSE=$(curl -s -w "\n__HTTP_CODE__%{http_code}" -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/report-email.json 2>&1)

          EMAIL_HTTP=$(echo "$EMAIL_RESPONSE" | grep -oE '__HTTP_CODE__[0-9]+' | sed 's/__HTTP_CODE__//')
          EMAIL_BODY=$(echo "$EMAIL_RESPONSE" | sed 's/__HTTP_CODE__[0-9]*$//')

          # Resend returns 200 with {"id":"..."} on success; 4xx/5xx on failure
          if [ "$EMAIL_HTTP" = "200" ] && echo "$EMAIL_BODY" | grep -q '"id"'; then
            EMAIL_ID=$(echo "$EMAIL_BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('id','no-id'))" 2>/dev/null || echo "no-id")
            echo "✓ Weekly report emailed via Resend (id: $EMAIL_ID)"
          else
            echo "::error::Resend API returned HTTP $EMAIL_HTTP. Body: $(echo "$EMAIL_BODY" | head -c 300)"
            exit 1
          fi
