name: Weekly Backup Restore Drill

# SEC-23 — REAL restore drill (replaces the former schema-only liveness check).
#
# The previous version never restored anything: it re-dumped the LIVE prod
# schema and grepped it for table names, so a green run proved nothing about
# recoverability and RTO stayed unproven. It also began with
# `if [ -z "$SUPABASE_DB_URL" ]; then ... exit 0` — a silent-skip that could
# pass green having done zero work (Backup Integrity Policy violation).
#
# This version actually proves restorability, every week, with NO prod secret:
#   1. Pull the most recent REAL backup artifact from backup-database.yml.
#   2. Restore it into a clean, throwaway Postgres 17 service container, with a
#      minimal Supabase compatibility shim (roles + auth.uid() + extensions) so
#      the RLS policies and cross-schema FKs restore as they would on a real
#      target.
#   3. Assert the DATA round-trips: restored table count, RLS-enabled count,
#      and per-table row counts must match what the dump claims.
#   4. Report the elapsed restore time as an RTO data point.
#
# Because it consumes the public-only dump, it proves the PUBLIC data is
# recoverable. The auth/storage/encrypted COMPLETE restore (backup-complete.yml)
# needs the offline age private key and is exercised in the manual quarterly
# break-glass drill — see docs/DISASTER_RECOVERY.md.

on:
  schedule:
    - cron: '0 5 * * 0'  # Sunday 05:00 UTC
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read   # to download the backup-database.yml artifact

jobs:
  restore-drill:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: drill
          POSTGRES_DB: restore_target
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGURL: postgresql://postgres:drill@localhost:5432/restore_target

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Install PostgreSQL 17 client
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update && sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Download most recent database backup artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/backup-database.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].id')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::No successful backup-database.yml run found — nothing to restore-test. This is itself a finding."
            exit 1
          fi
          echo "Restoring from backup-database.yml run $RUN_ID"
          gh run download "$RUN_ID" -R "${{ github.repository }}" --dir ./restore-src
          SQL=$(find ./restore-src -name 'lyra_backup_*.sql' | head -1)
          if [ -z "$SQL" ]; then
            echo "::error::downloaded artifact contains no lyra_backup_*.sql"
            find ./restore-src -type f
            exit 1
          fi
          echo "SQL_FILE=$SQL" >> "$GITHUB_ENV"
          # Refuse to "pass" on the degraded REST fallback — it is only 4 tables.
          METHOD=$(find ./restore-src -name BACKUP_METHOD -exec grep -h '^BACKUP_METHOD=' {} \; | head -1 | cut -d= -f2 || echo unknown)
          echo "Backup method: ${METHOD:-unknown}"
          if [ "$METHOD" = "rest_api_fallback" ]; then
            echo "::error::Latest backup is the degraded REST fallback (4 tables) — cannot validate a full restore. Investigate why pg_dump failed."
            exit 1
          fi

      - name: Bootstrap Supabase compatibility shim
        run: |
          set -euo pipefail
          # A vanilla Postgres lacks the Supabase roles, the auth.uid()/role()
          # helpers that RLS policies reference, the auth.users table that public
          # FKs point at, and the extensions schema. Recreate the minimum needed
          # so the dump restores the way it would on a real target. This shim IS
          # the documented "what a clean-room restore must provide beyond the
          # public dump" — see docs/DISASTER_RECOVERY.md.
          psql "$PGURL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE r text;
          BEGIN
            FOREACH r IN ARRAY ARRAY[
              'anon','authenticated','service_role','authenticator',
              'supabase_admin','supabase_auth_admin','supabase_storage_admin','dashboard_user'
            ] LOOP
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = r) THEN
                EXECUTE format('CREATE ROLE %I NOLOGIN', r);
              END IF;
            END LOOP;
          END $$;

          CREATE SCHEMA IF NOT EXISTS extensions;
          CREATE EXTENSION IF NOT EXISTS pgcrypto WITH SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp" WITH SCHEMA extensions;

          CREATE SCHEMA IF NOT EXISTS auth;
          -- Minimal auth.users so public FKs (profiles.user_id -> auth.users.id) resolve.
          CREATE TABLE IF NOT EXISTS auth.users (id uuid PRIMARY KEY);
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS $$ SELECT NULL::uuid $$;
          CREATE OR REPLACE FUNCTION auth.role() RETURNS text LANGUAGE sql STABLE AS $$ SELECT NULL::text $$;
          CREATE OR REPLACE FUNCTION auth.jwt() RETURNS jsonb LANGUAGE sql STABLE AS $$ SELECT '{}'::jsonb $$;
          SQL
          echo "✓ shim ready"

      - name: Restore the backup
        run: |
          set -euo pipefail
          echo "Restoring $SQL_FILE ..."
          START=$(date +%s)
          # session_replication_role=replica defers FK/trigger enforcement so the
          # public-only dump loads despite its dangling auth.users FKs (those rows
          # live in the auth schema, which this public dump does NOT contain — the
          # SEC-23 gap). ON_ERROR_STOP=0 lets ownership/grant noise through; the
          # row-count assertions below are the real pass/fail, and every restore
          # error is surfaced loudly in the summary, never swallowed.
          { echo "SET session_replication_role = replica;"; cat "$SQL_FILE"; } \
            | psql "$PGURL" -v ON_ERROR_STOP=0 2> restore.err || true
          END=$(date +%s)
          echo "RESTORE_SECONDS=$((END - START))" >> "$GITHUB_ENV"
          ERR_COUNT=$(grep -c 'ERROR:' restore.err || true)
          echo "RESTORE_ERR_COUNT=$ERR_COUNT" >> "$GITHUB_ENV"
          echo "Restore finished in $((END - START))s with ${ERR_COUNT} statement error(s)"

      - name: Assert the data round-trips
        run: |
          set -euo pipefail
          {
            echo "## Backup Restore Drill"
            echo ""
            echo "- Restore time: **${RESTORE_SECONDS}s** (RTO data point)"
            echo "- Non-fatal restore statement errors: ${RESTORE_ERR_COUNT}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          FAIL=0

          # Expected table count = CREATE TABLE statements in the dump.
          EXPECT_TABLES=$(grep -c '^CREATE TABLE ' "$SQL_FILE")
          GOT_TABLES=$(psql "$PGURL" -X -t -A -c \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE'")
          if [ "$GOT_TABLES" -eq "$EXPECT_TABLES" ] && [ "$EXPECT_TABLES" -gt 0 ]; then
            echo "- ✅ tables: $GOT_TABLES restored (dump declares $EXPECT_TABLES)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ tables: restored $GOT_TABLES but dump declares $EXPECT_TABLES" >> "$GITHUB_STEP_SUMMARY"
            FAIL=1
          fi

          # RLS must survive a restore.
          EXPECT_RLS=$(grep -c 'ENABLE ROW LEVEL SECURITY' "$SQL_FILE")
          GOT_RLS=$(psql "$PGURL" -X -t -A -c \
            "SELECT count(*) FROM pg_tables WHERE schemaname='public' AND rowsecurity")
          if [ "$GOT_RLS" -eq "$EXPECT_RLS" ]; then
            echo "- ✅ RLS-enabled tables: $GOT_RLS (matches dump)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ RLS-enabled tables: restored $GOT_RLS but dump declares $EXPECT_RLS" >> "$GITHUB_STEP_SUMMARY"
            FAIL=1
          fi

          # Per-table row-count round-trip. Parse expected counts from each
          # `COPY public.x ... FROM stdin;` ... `\.` block, then compare to the
          # restored database. ANY mismatch fails the drill.
          awk '
            /^COPY public\./ { t=$2; sub(/^public\./,"",t); c[t]=0; inblk=1; next }
            inblk && /^\\\.$/ { inblk=0; next }
            inblk { c[t]++ }
            END { for (k in c) print k"\t"c[k] }
          ' "$SQL_FILE" > /tmp/expected.tsv

          MISMATCH=0; CHECKED=0
          while IFS=$'\t' read -r tbl exp; do
            [ -n "$tbl" ] || continue
            got=$(psql "$PGURL" -X -t -A -c "SELECT count(*) FROM public.\"$tbl\"" 2>/dev/null || echo "ERR")
            CHECKED=$((CHECKED+1))
            if [ "$got" != "$exp" ]; then
              echo "- ❌ row count mismatch: public.$tbl expected $exp, restored $got" >> "$GITHUB_STEP_SUMMARY"
              MISMATCH=$((MISMATCH+1)); FAIL=1
            fi
          done < /tmp/expected.tsv

          if [ "$MISMATCH" -eq 0 ]; then
            echo "- ✅ row counts: all $CHECKED data tables round-tripped exactly" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Representative query must work end-to-end.
          if psql "$PGURL" -X -t -A -c "SELECT count(*) FROM public.profiles" >/dev/null 2>&1; then
            echo "- ✅ representative query (profiles) executed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ representative query failed" >> "$GITHUB_STEP_SUMMARY"; FAIL=1
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**❌ Restore drill FAILED — the most recent backup did not round-trip. Treat backups as suspect.**" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Restore drill failed — see the run summary. First restore errors:"
            head -20 restore.err || true
            exit 1
          fi
          echo "✅ Restore drill passed — backup is restorable; data round-tripped."
