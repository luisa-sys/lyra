name: Weekly Mutation Testing (Stryker)

on:
  schedule:
    - cron: '0 4 * * 0'  # Sunday 04:00 UTC (after backup at 02:00)
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  mutation-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Stryker
        run: npm install --no-save @stryker-mutator/core @stryker-mutator/jest-runner @stryker-mutator/typescript-checker

      - name: Run Stryker mutation testing
        run: npx stryker run
        continue-on-error: true

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: mutation-report-${{ github.run_id }}
          path: reports/mutation/
          retention-days: 90

      - name: Summary
        if: always()
        run: |
          set -euo pipefail
          if [ -f reports/mutation/mutation-report.json ]; then
            SCORE=$(cat reports/mutation/mutation-report.json | python3 -c "
          import json, sys
          try:
            data = json.load(sys.stdin)
            killed = data.get('mutationScore', 0)
            print(f'{killed:.1f}')
          except:
            print('N/A')
          " 2>/dev/null || echo "N/A")
            echo "## Mutation Testing Results" >> $GITHUB_STEP_SUMMARY
            echo "Mutation score: **${SCORE}%**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Full report available in the uploaded artifact." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Mutation Testing" >> $GITHUB_STEP_SUMMARY
            echo "No report generated. Check the Stryker run step for errors." >> $GITHUB_STEP_SUMMARY
          fi
