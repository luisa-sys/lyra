name: Deploy to Staging
on:
  push:
    branches: [staging]
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
jobs:
  lint-and-unit-tests:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run type check
        run: npm run type-check
      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: true
      - name: Run npm audit (high/critical vulnerabilities block deploy)
        run: npm audit --audit-level=high

  build-verification:
    name: Build Verification
    needs: lint-and-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      - name: Verify build output
        run: |
          test -d .next || (echo "Build output missing" && exit 1)
          echo "Build output verified"

  deploy-staging:
    name: Deploy to stage.checklyra.com
    needs: build-verification
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

  post-deploy-checks:
    name: Post-Deploy Health Checks
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Wait for deployment propagation
        run: sleep 20
      # BUGS-4: verify Vercel actually deployed our SHA before health-checking.
      # Without this, the 401 from stage.checklyra.com (Vercel SSO) would be
      # accepted as success even if the deploy never happened or rolled back.
      - name: Verify Vercel deployment matches commit SHA
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=6
          ATTEMPT=0
          STATE=""
          DEPLOY_UID=""
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            DEPLOY_INFO=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&target=staging&limit=5" \
              | python3 -c "
          import json, sys
          target = '$EXPECTED_SHA'
          data = json.load(sys.stdin)
          for d in data.get('deployments', []):
              meta = d.get('meta', {}) or {}
              sha = meta.get('githubCommitSha') or ''
              if sha == target:
                  print(f\"{d.get('uid')}|{d.get('readyState')}|{sha}\")
                  break
          else:
              print('NONE||')
          ")
            DEPLOY_UID=$(echo "$DEPLOY_INFO" | cut -d'|' -f1)
            STATE=$(echo "$DEPLOY_INFO" | cut -d'|' -f2)

            if [ "$DEPLOY_UID" = "NONE" ]; then
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: no Vercel staging deployment for SHA ${EXPECTED_SHA:0:8} yet"
              [ $ATTEMPT -lt $MAX_ATTEMPTS ] && sleep 15 && continue
              echo "::error::Vercel has no staging deployment for SHA ${EXPECTED_SHA:0:8}"
              exit 1
            fi

            if [ "$STATE" = "READY" ]; then
              echo "::notice::Vercel deployment $DEPLOY_UID for SHA ${EXPECTED_SHA:0:8} is READY"
              break
            fi

            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: deployment $DEPLOY_UID is $STATE"
            [ $ATTEMPT -lt $MAX_ATTEMPTS ] && sleep 15
          done

          if [ "$STATE" != "READY" ]; then
            echo "::error::Vercel deployment $DEPLOY_UID never reached READY state ($STATE)"
            exit 1
          fi
      - name: Verify env wiring via /api/health (KAN-175)
        env:
          VERCEL_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS }}
          DEPLOY_URL: ${{ needs.deploy-staging.outputs.deploy_url }}
        run: |
          set -uo pipefail
          # KAN-175: Cloudflare bot challenge blocks CI runner IPs from
          # reaching stage.checklyra.com directly. We hit the Vercel
          # deployment URL directly (lyra-xxx.vercel.app) which isn't
          # proxied through Cloudflare. Bypass header travels intact.
          # Verified working 2026-05-05.
          #
          # Outcomes (per CLAUDE.md gotcha #14):
          #   200 + correct values → ::notice::, exit 0
          #   200 + WRONG values   → ::error::, exit 1 (real regression)
          #   non-2xx              → ::warning::, exit 0 (Vercel-side issue)
          if [ -z "$VERCEL_BYPASS" ]; then
            echo "::warning::VERCEL_AUTOMATION_BYPASS secret not set; skipping staging health smoke."
            exit 0
          fi
          if [ -z "$DEPLOY_URL" ]; then
            echo "::warning::deploy_url output missing from deploy-staging job; skipping smoke."
            exit 0
          fi
          DEPLOY_URL_CLEAN="${DEPLOY_URL#https://}"
          DEPLOY_URL_CLEAN="${DEPLOY_URL_CLEAN#http://}"
          echo "Hitting: https://$DEPLOY_URL_CLEAN/api/health"
          RESPONSE=$(curl -s -H "x-vercel-protection-bypass: $VERCEL_BYPASS" -w "\n%{http_code}" --max-time 20 \
            "https://$DEPLOY_URL_CLEAN/api/health")
          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $STATUS"
          echo "Body: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Staging health smoke received HTTP $STATUS instead of 200. Skipping assertion."
            exit 0
          fi
          SITE_URL=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('siteUrl',''))")
          IS_BETA=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('isBetaDeploy',False))")
          if [ "$SITE_URL" != "https://stage.checklyra.com" ]; then
            echo "::error::Staging health: NEXT_PUBLIC_SITE_URL='$SITE_URL', expected 'https://stage.checklyra.com'."
            exit 1
          fi
          if [ "$IS_BETA" = "True" ]; then
            echo "::error::Staging health: isBetaDeploy is True — staging must NOT have the beta gate active."
            exit 1
          fi
          echo "::notice::Staging env wiring verified (siteUrl=$SITE_URL)"
      - name: Health check — MCP server
        run: |
          set -euo pipefail
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://mcp.checklyra.com/health")
          echo "MCP health: $STATUS"
          # 200 = server up
          # 403 = Cloudflare bot challenge from datacenter IPs (acceptable for CI; KAN-160)
          # Any 5xx or other = real failure
          # integrity-ok: 403 is bot-block — verified server returns 200 to non-CI clients (BUGS-7)
          case "$STATUS" in
            200|403)
              echo "::notice::MCP health acceptable: $STATUS"
              ;;
            *)
              echo "::error::MCP health check failed ($STATUS)"
              exit 1
              ;;
          esac
      - name: Smoke test — staging site
        run: |
          set -euo pipefail
          # SHA verification above is the primary success signal. This URL
          # check is defense-in-depth — it confirms stage.checklyra.com is
          # reachable. Vercel SSO returns 401 for unauthenticated curl,
          # which is expected and acceptable here. integrity-ok: 401 SHA-verified above
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://stage.checklyra.com")
          echo "Staging site: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ] || (echo "::error::Staging site unreachable" && exit 1)
