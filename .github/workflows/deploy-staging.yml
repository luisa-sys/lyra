name: Deploy to Staging

on:
  push:
    branches: [staging]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  lint-and-unit-tests:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint      - name: Run type check
        run: npm run type-check
      - name: Run unit tests
        run: npm run test:unit -- --coverage
        env:
          CI: true

  integration-tests:
    name: Integration Tests
    needs: lint-and-unit-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lyra_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: lyra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://lyra_test:test_password@localhost:5432/lyra_test
      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://lyra_test:test_password@localhost:5432/lyra_test
          CI: true

  e2e-tests:
    name: End-to-End Tests (Playwright)
    needs: lint-and-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

  deploy-staging:
    name: Deploy to stage.checklyra.com
    needs: [integration-tests, e2e-tests]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel (staging)
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
          vercel alias set $URL stage.checklyra.com --token=${{ secrets.VERCEL_TOKEN }}
      - name: Report to Jira
        if: always()
        uses: rohit-gohri/jira-ci-cd-integration@v0
        with:
          state: ${{ job.status }}
          environment: staging
          jira_instance: checklyra
          client_id: ${{ secrets.JIRA_CLIENT_ID }}
          client_secret: ${{ secrets.JIRA_CLIENT_SECRET }}