name: Deploy to Staging
on:
  push:
    branches: [staging]
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
jobs:
  lint-and-unit-tests:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run type check
        run: npm run type-check
      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: true
      - name: Run npm audit (high/critical only)
        run: npm audit --audit-level=high || true

  build-verification:
    name: Build Verification
    needs: lint-and-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Verify build output
        run: |
          test -d .next || (echo "Build output missing" && exit 1)
          echo "Build output verified"

  deploy-staging:
    name: Deploy to stage.checklyra.com
    needs: build-verification
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

  post-deploy-checks:
    name: Post-Deploy Health Checks
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment propagation
        run: sleep 20
      - name: Health check — MCP server
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://mcp.checklyra.com/health")
          echo "MCP health: $STATUS"
          [ "$STATUS" = "200" ] || (echo "::error::MCP health check failed" && exit 1)
      - name: Smoke test — staging site
        run: |
          # Staging is behind Vercel Auth (SSO), so 401 is expected
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://stage.checklyra.com")
          echo "Staging site: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || (echo "::error::Staging site unreachable" && exit 1)
