name: Promote to Production
# BUGS-16 / BUGS-11 (2026-05-15 final fix): direct fast-forward merge of
# beta → main, no release PR. The previous PR + auto-merge pattern was
# blocked by a phantom Vercel check_suite (status=queued, runs=0, never
# completes). Auto-merge waits on ALL check_suite entries on the PR head
# regardless of `required_status_checks.contexts`, so the phantom held
# every release PR forever; every prod release required admin-merge.
#
# Direct merge avoids the PR entirely. The same safety machinery is
# preserved by sequencing:
#   1. verify-source — beta CI green at HEAD (was already here)
#   2. merge-and-push — fast-forward beta → main, push with LYRA_RELEASE_PAT
#   3. wait-for-deploy — wait for deploy-production.yml to complete on the
#      merged SHA. deploy-production.yml already runs lint + unit tests +
#      build verification + audit before deploying, so the gates the old
#      "PR Quality Gate" check ran twice now only run once.
#   4. smoke-tests — production endpoints + Vercel SHA verification
#   5. release-tag — only after smoke passes
#   6. auto-rollback (on failure) — uses captured pre-merge main SHA
#
# This mirrors the pattern promote-staging-to-beta.yml has used since
# KAN-175 with no incidents, and what promote-to-staging.yml uses for
# develop → staging.
#
# Refs: BUGS-11, BUGS-16, KAN-173, KAN-175

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "PRODUCTION" to confirm (case sensitive)'
        required: true

permissions:
  contents: write
  actions: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

defaults:
  run:
    shell: bash

jobs:
  verify-source:
    name: Verify beta pipeline passed at HEAD
    runs-on: ubuntu-latest
    outputs:
      beta_sha: ${{ steps.check.outputs.beta_sha }}
      beta_short: ${{ steps.check.outputs.beta_short }}
      main_sha_before_merge: ${{ steps.check.outputs.main_sha_before_merge }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: beta
      - name: Check beta CI passed at beta HEAD (BUGS-4 fix)
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.confirm }}" != "PRODUCTION" ]; then
            echo "::error::You must type 'PRODUCTION' (case sensitive) to confirm"
            exit 1
          fi

          BETA_SHA=$(git rev-parse HEAD)
          BETA_SHORT="${BETA_SHA:0:8}"
          echo "beta HEAD: $BETA_SHA"
          echo "beta_sha=$BETA_SHA" >> "$GITHUB_OUTPUT"
          echo "beta_short=$BETA_SHORT" >> "$GITHUB_OUTPUT"

          # BUGS-9: capture main HEAD BEFORE the merge so auto-rollback knows
          # which SHA to roll back to. We can't compute this in auto-rollback
          # itself because by then main has already moved.
          MAIN_SHA_BEFORE_MERGE=$(gh api repos/${{ github.repository }}/branches/main --jq .commit.sha)
          if [ -z "$MAIN_SHA_BEFORE_MERGE" ] || [ "$MAIN_SHA_BEFORE_MERGE" = "null" ]; then
            echo "::error::Could not determine main HEAD before merge — auto-rollback would have no target SHA"
            exit 1
          fi
          echo "main HEAD pre-merge: $MAIN_SHA_BEFORE_MERGE"
          echo "main_sha_before_merge=$MAIN_SHA_BEFORE_MERGE" >> "$GITHUB_OUTPUT"

          # BUGS-4: filter by headSha to avoid matching stale runs.
          # KAN-175: source is now `beta` and CI workflow is `deploy-beta.yml`.
          # BUGS-20 (2026-05-17): budget raised 10→30 attempts. Beta CI
          # (build + lint + unit + audit + deploy) typically takes 3–5
          # minutes. With sleep 15s the previous 10-attempt budget gave
          # only 150s, which was tight enough that a same-day chain
          # promote often timed out on the first try. 30 attempts × 15s
          # = 7.5 min budget — comfortably covers a normal beta CI run
          # without making real failures wait unreasonably long. If beta
          # CI ever genuinely takes >7.5 min, fix the build, not this
          # budget.
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            RUN_INFO=$(gh run list \
              --repo "${{ github.repository }}" \
              --branch beta \
              --workflow deploy-beta.yml \
              --limit 10 \
              --json status,conclusion,headSha,databaseId \
              | python3 -c "
          import json, sys
          target = '$BETA_SHA'
          runs = json.load(sys.stdin)
          for r in runs:
              if r['headSha'] == target:
                  print(f\"{r['status']}|{r['conclusion'] or 'pending'}|{r['databaseId']}\")
                  break
          else:
              print('NONE||')
          ")
            STATUS=$(echo "$RUN_INFO" | cut -d'|' -f1)
            CONCLUSION=$(echo "$RUN_INFO" | cut -d'|' -f2)
            RUN_ID=$(echo "$RUN_INFO" | cut -d'|' -f3)

            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: beta CI for $BETA_SHORT = $STATUS / $CONCLUSION"

            if [ "$STATUS" = "NONE" ]; then
              echo "  No deploy-beta run for SHA $BETA_SHORT yet"
            elif [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "success" ]; then
              echo "::notice::Beta CI verified for $BETA_SHORT (run $RUN_ID)"
              exit 0
            elif [ "$STATUS" = "completed" ] && [ "$CONCLUSION" != "success" ]; then
              echo "::error::Beta CI for $BETA_SHORT concluded $CONCLUSION (run $RUN_ID). Fix before promoting."
              exit 1
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              sleep 15
            fi
          done
          echo "::error::Could not verify beta CI for $BETA_SHORT after $MAX_ATTEMPTS attempts."
          exit 1

  merge-and-push:
    name: Merge beta → main
    needs: verify-source
    runs-on: ubuntu-latest
    outputs:
      merge_sha: ${{ steps.merge.outputs.merge_sha }}
    steps:
      # BUGS-16: use LYRA_RELEASE_PAT for the push so deploy-production.yml
      # fires. GITHUB_TOKEN would silently suppress the trigger (gotcha #16).
      # The PAT was updated 2026-05-15 with Workflows:write so it can also
      # push workflow-file changes if a release contains them.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.LYRA_RELEASE_PAT }}
      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge beta into main
        id: merge
        env:
          BETA_SHA: ${{ needs.verify-source.outputs.beta_sha }}
          BETA_SHORT: ${{ needs.verify-source.outputs.beta_short }}
        run: |
          set -euo pipefail
          # The checkout step above lands us on a detached HEAD by default
          # (refs/remotes/origin/main). Switch to a local 'main' branch
          # tracking origin/main, then ensure we're up to date. We must NOT
          # use `git fetch origin main:main` here — that errors with
          # "refusing to fetch into branch refs/heads/main checked out at"
          # because once we've created local main below, that ref is in use.
          git fetch origin beta
          git checkout -B main origin/main
          git pull origin main --ff-only

          # Standard fast-forward-able merge. If beta has main as a strict
          # ancestor (the normal case — beta was promoted from staging which
          # was promoted from develop which had main back-merged), this is a
          # fast-forward. Otherwise it produces a merge commit; either way
          # the result is identical to what the old PR-based flow produced.
          git merge origin/beta -m "Promote beta → production ($BETA_SHORT) [workflow_dispatch]"
          MERGE_SHA=$(git rev-parse HEAD)
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"

          echo "Pushing main at SHA $MERGE_SHA..."
          git push origin main
          echo "::notice::Pushed main at $MERGE_SHA. deploy-production.yml should trigger now."

          {
            echo "## 🚀 Promotion merged to main"
            echo ""
            echo "- Source: \`beta\` @ \`$BETA_SHORT\`"
            echo "- Merged SHA: \`${MERGE_SHA:0:8}\`"
            echo ""
            echo "Waiting for deploy-production.yml to complete on the merged SHA..."
          } >> "$GITHUB_STEP_SUMMARY"

  wait-for-deploy:
    name: Wait for production deploy (SHA-matched)
    needs: merge-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploy-production.yml run for our SHA
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ needs.merge-and-push.outputs.merge_sha }}
        run: |
          set -euo pipefail
          echo "Waiting for deploy-production.yml run with headSha=$EXPECTED_SHA..."
          TIMEOUT=600
          ELAPSED=0
          INTERVAL=20
          while [ $ELAPSED -lt $TIMEOUT ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))

            RUN_INFO=$(gh run list \
              --repo "${{ github.repository }}" \
              --branch main \
              --workflow deploy-production.yml \
              --limit 5 \
              --json status,conclusion,headSha,databaseId \
              | python3 -c "
          import json, sys
          target = '$EXPECTED_SHA'
          runs = json.load(sys.stdin)
          for r in runs:
              if r['headSha'] == target:
                  print(f\"{r['status']}|{r['conclusion'] or 'pending'}|{r['databaseId']}\")
                  break
          else:
              print('NONE||')
          ")
            STATUS=$(echo "$RUN_INFO" | cut -d'|' -f1)
            CONCLUSION=$(echo "$RUN_INFO" | cut -d'|' -f2)
            RUN_ID=$(echo "$RUN_INFO" | cut -d'|' -f3)

            if [ "$STATUS" = "NONE" ]; then
              echo "  No deploy-production run for SHA ${EXPECTED_SHA:0:8} yet ($ELAPSED/${TIMEOUT}s)"
              continue
            fi

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "::notice::deploy-production run $RUN_ID succeeded for SHA ${EXPECTED_SHA:0:8}"
                exit 0
              else
                echo "::error::deploy-production run $RUN_ID FAILED ($CONCLUSION) for SHA ${EXPECTED_SHA:0:8}"
                exit 1
              fi
            fi

            echo "  deploy-production run $RUN_ID is $STATUS for SHA ${EXPECTED_SHA:0:8} ($ELAPSED/${TIMEOUT}s)"
          done

          echo "::error::deploy-production.yml never produced a run for SHA ${EXPECTED_SHA:0:8} after ${TIMEOUT}s"
          echo "::error::This usually means the merge push did not trigger downstream workflows."
          echo "::error::Check that LYRA_RELEASE_PAT is set and the merge job uses it (not GITHUB_TOKEN)."
          exit 1

  smoke-tests:
    name: Production smoke tests + SHA verification
    needs: [merge-and-push, wait-for-deploy]
    runs-on: ubuntu-latest
    steps:
      # BUGS-4: verify Vercel actually deployed our SHA to production.
      - name: Verify Vercel deployed our SHA to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          EXPECTED_SHA: ${{ needs.merge-and-push.outputs.merge_sha }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=6
          ATTEMPT=0
          STATE=""
          DEPLOY_UID=""
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            DEPLOY_INFO=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&target=production&limit=5" \
              | python3 -c "
          import json, sys
          target = '$EXPECTED_SHA'
          data = json.load(sys.stdin)
          for d in data.get('deployments', []):
              meta = d.get('meta', {}) or {}
              sha = meta.get('githubCommitSha') or ''
              if sha == target:
                  print(f\"{d.get('uid')}|{d.get('readyState')}|{sha}\")
                  break
          else:
              print('NONE||')
          ")
            DEPLOY_UID=$(echo "$DEPLOY_INFO" | cut -d'|' -f1)
            STATE=$(echo "$DEPLOY_INFO" | cut -d'|' -f2)

            if [ "$DEPLOY_UID" = "NONE" ]; then
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: no Vercel production deployment for SHA ${EXPECTED_SHA:0:8} yet"
              [ $ATTEMPT -lt $MAX_ATTEMPTS ] && sleep 15 && continue
              echo "::error::Vercel has no production deployment for SHA ${EXPECTED_SHA:0:8}"
              exit 1
            fi

            if [ "$STATE" = "READY" ]; then
              echo "::notice::Vercel deployment $DEPLOY_UID for SHA ${EXPECTED_SHA:0:8} is READY"
              break
            fi

            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: deployment $DEPLOY_UID is $STATE"
            [ $ATTEMPT -lt $MAX_ATTEMPTS ] && sleep 15
          done

          if [ "$STATE" != "READY" ]; then
            echo "::error::Vercel deployment $DEPLOY_UID never reached READY state ($STATE)"
            exit 1
          fi
      - name: Wait for CDN propagation
        run: sleep 15
      - name: Smoke tests on public endpoints
        run: |
          set -euo pipefail
          FAIL=0
          for ENDPOINT in \
            "https://checklyra.com|200,403|Landing" \
            "https://checklyra.com/privacy|200,403|Privacy" \
            "https://checklyra.com/terms|200,403|Terms" \
            "https://checklyra.com/sitemap.xml|200,403|Sitemap" \
            "https://checklyra.com/robots.txt|200,403|Robots" \
            "https://checklyra.com/llms.txt|200,403|LLMs" \
            "https://checklyra.com/.well-known/mcp.json|200,403|MCP discovery" \
            "https://mcp.checklyra.com/health|200,403|MCP health"; do
            IFS='|' read -r URL EXPECTED LABEL <<< "$ENDPOINT"
            ACTUAL=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "000")
            PASS=0
            IFS=',' read -ra CODES <<< "$EXPECTED"
            for CODE in "${CODES[@]}"; do
              [ "$ACTUAL" = "$CODE" ] && PASS=1
            done
            if [ $PASS -eq 1 ]; then
              echo "✓ $LABEL: $ACTUAL"
            else
              echo "::error::✗ $LABEL: $ACTUAL (expected $EXPECTED)"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] || exit 1
      - name: MCP protocol handshake
        run: |
          set -euo pipefail
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 15 -X POST "https://mcp.checklyra.com/mcp" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}}}')
          if [ "$STATUS" = "403" ]; then
            echo "⚠ MCP returned 403 (Cloudflare challenge) — skipping handshake"
          else
            RESPONSE=$(curl -s --max-time 15 -X POST "https://mcp.checklyra.com/mcp" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}}}')
            echo "$RESPONSE" | grep -q "lyra-mcp-server" || (echo "::error::MCP handshake failed" && exit 1)
            echo "✓ MCP protocol handshake OK"
          fi

  release-tag:
    name: Create release tag
    needs: [merge-and-push, smoke-tests]
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      # BUGS-4: tag created AFTER smoke tests pass (was: tag before deploy).
      # This way a failed deploy doesn't leave a misleading version tag.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.LYRA_RELEASE_PAT }}
      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Create and push release tag
        id: tag
        run: |
          set -euo pipefail
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST_TAG#v}"
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG — promoted from beta"
          git push origin "$NEW_TAG"
          echo "Tagged: $NEW_TAG"
          echo "release_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

  summary:
    name: Production promotion summary
    needs: [merge-and-push, smoke-tests, release-tag]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Final summary
        env:
          MERGE_SHA: ${{ needs.merge-and-push.outputs.merge_sha }}
          RELEASE_TAG: ${{ needs.release-tag.outputs.release_tag }}
          SMOKE_RESULT: ${{ needs.smoke-tests.result }}
          TAG_RESULT: ${{ needs.release-tag.result }}
        run: |
          set -euo pipefail
          if [ "$SMOKE_RESULT" = "success" ] && [ "$TAG_RESULT" = "success" ]; then
            {
              echo "## ✅ Production Deployment Complete"
              echo ""
              echo "Production deployed at SHA \`${MERGE_SHA:0:8}\` (\`$RELEASE_TAG\`)."
              echo ""
              echo "- Production: https://checklyra.com"
              echo "- MCP server: https://mcp.checklyra.com/health"
              echo "- Vercel deployment SHA-verified"
              echo "- All 9 smoke tests passed"
              echo "- BUGS-11 / BUGS-16: direct-merge flow worked, no admin intervention"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## ❌ Production Promotion Failed"
              echo ""
              echo "- Smoke tests: $SMOKE_RESULT"
              echo "- Release tag: $TAG_RESULT"
              echo "- Merge SHA: \`${MERGE_SHA:0:8}\`"
              echo ""
              echo "Investigate via Actions tab. Auto-rollback may have triggered."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  auto-rollback:
    name: Auto-rollback on failure
    # BUGS-9 + KAN-233: triggers on any failure in the smoke-tests OR the
    # earlier pipeline (verify-source). `failure()` is true when any
    # ancestor in `needs` has status=failure, so a smoke-test failure
    # alone is enough to fire — even though merge-and-push succeeded.
    needs: [verify-source, smoke-tests]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - name: Roll production back to pre-merge SHA (BUGS-9)
        id: rollback
        env:
          TARGET_SHA: ${{ needs.verify-source.outputs.main_sha_before_merge }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # set -euo pipefail in the script itself; no swallowing fallbacks.
        # Replaces the previous `vercel ls --json | filter target=production`
        # parser that printed "NONE" on shape mismatch, then promoted the
        # string "NONE", then swallowed the error with `|| echo ::warning::`,
        # producing a false-positive success. See run 25324541577.
        run: python3 scripts/rollback-to-sha.py

      # KAN-233 — alert the human on a self-healed rollback. Without this,
      # an auto-rollback that fires at 03:00 UTC could go unnoticed for
      # hours. Resend is already wired for weekly-report + security-audit.
      - name: Email rollback alert via Resend
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ROLLBACK_STATUS: ${{ steps.rollback.outcome }}
          ROLLBACK_TARGET_SHA: ${{ needs.verify-source.outputs.main_sha_before_merge }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${RESEND_API_KEY:-}" ]; then
            # KAN-167: missing-secret must be loud, not silent. Emit an
            # ::error:: annotation but don't fail the rollback itself —
            # the email is advisory; the rollback already ran.
            echo "::error::RESEND_API_KEY not set — rollback fired but no email alert was sent"
            exit 0
          fi

          STATUS_EMOJI="✅"
          STATUS_WORD="succeeded"
          if [ "$ROLLBACK_STATUS" != "success" ]; then
            STATUS_EMOJI="❌"
            STATUS_WORD="FAILED (manual intervention required)"
          fi

          export SUBJECT="$STATUS_EMOJI Lyra auto-rollback $STATUS_WORD — production"
          export BODY_HTML="<p><strong>The Lyra production deploy was auto-rolled back.</strong></p><ul><li>Target SHA: <code>$ROLLBACK_TARGET_SHA</code></li><li>Rollback step status: <strong>$ROLLBACK_STATUS</strong></li><li><a href=\"$GITHUB_RUN_URL\">View the workflow run for details</a></li></ul><p>If status=success, production is back on the pre-merge SHA. Investigate the failing smoke test, fix on develop, re-promote.</p><p>If status=failure, the rollback itself failed — production may be in an inconsistent state. See <code>docs/RUNBOOK.md</code> &rarr; \"Self-healing flows\" for the manual recovery procedure.</p>"

          python3 -c "
          import json, os
          payload = {
              'from': 'Lyra Ops <ops@checklyra.com>',
              'to': ['luisa@santos-stephens.com'],
              'subject': os.environ['SUBJECT'],
              'html': os.environ['BODY_HTML'],
          }
          with open('/tmp/rollback-email.json', 'w') as f:
              json.dump(payload, f)
          " || { echo "::error::failed to build email payload"; exit 1; }

          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H 'Content-Type: application/json' \
            -d @/tmp/rollback-email.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Rollback alert sent (Resend id: $(echo "$BODY" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("id","?"))'))"
          else
            echo "::error::Resend returned HTTP $HTTP_CODE: $(echo "$BODY" | head -c 300)"
            exit 1
          fi
