name: Deploy to Development
on:
  push:
    branches: [develop]
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run type check
        run: npm run type-check
      - name: Run unit tests with coverage
        run: npx jest --testPathPatterns="tests/unit" --coverage
        env:
          CI: true
      - name: Verify build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
      - name: Run npm audit (high/critical vulnerabilities block deploy)
        run: npm audit --audit-level=high
  deploy-dev:
    name: Deploy to dev.checklyra.com
    needs: lint-and-test
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
      - name: Post-deploy health check
        run: |
          echo "Waiting 15s for deployment to propagate..."
          sleep 15
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 10 "${{ steps.deploy.outputs.deploy_url }}" || echo "000")
          echo "Health check: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ] && [ "$STATUS" != "403" ]; then
            echo "::error::Health check failed with status $STATUS"
            exit 1
          fi
