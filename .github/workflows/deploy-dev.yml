name: Deploy to Development
on:
  push:
    branches: [develop]
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

defaults:
  run:
    shell: bash

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run type check
        run: npm run type-check
      - name: Run unit tests with coverage
        run: npx jest --testPathPatterns="tests/unit" --coverage
        env:
          CI: true
      - name: Verify build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
      - name: Run npm audit (high/critical vulnerabilities block deploy)
        run: npm audit --audit-level=high
  deploy-dev:
    name: Deploy to dev.checklyra.com
    needs: lint-and-test
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        # KAN-104 diagnostic: also pass --git-branch=develop so branch-scoped
        # vars (if Vercel's CLI requires explicit branch context to pick them
        # up) are guaranteed to be included alongside the unscoped preview
        # vars. Revert once we know which Vercel CLI behaviour applies.
        run: vercel pull --yes --environment=preview --git-branch=develop --token=${{ secrets.VERCEL_TOKEN }}
      - name: DIAG (KAN-104) — inspect pulled env files for Sentry vars
        # Diagnostic only — prints which files vercel pull produced and
        # whether SENTRY-prefixed keys are present (values masked).
        # Remove this step once Sentry is confirmed loading on dev.
        run: |
          set -euo pipefail
          echo "::group::.vercel/ listing"
          ls -la .vercel/ || echo "(no .vercel directory)"
          echo "::endgroup::"
          echo "::group::SENTRY keys in pulled env files (values masked)"
          for f in .vercel/.env*.local .vercel/.env*; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            grep -i "SENTRY\|IS_SENTRY" "$f" | sed 's/=.*$/=<value-redacted>/' || echo "(no SENTRY keys present)"
          done
          echo "::endgroup::"
      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: DIAG (KAN-104) — inspect built bundle for the DSN string
        # If the pulled env had the DSN but the built bundle doesn't,
        # vercel build / next build is dropping it (Hypothesis B or C).
        # If the pulled env didn't have it, vercel pull is the culprit.
        run: |
          set -euo pipefail
          echo "::group::Search build output for DSN domain marker"
          # The DSN ingestion host: o4511340602523648.ingest.de.sentry.io
          # The leading numeric host segment is a stable fingerprint —
          # if it's in the bundle, init code is wired up.
          if grep -r "o4511340602523648" .vercel/output/ >/dev/null 2>&1; then
            echo "✅ DSN marker found in built bundle"
          else
            echo "❌ DSN marker NOT in built bundle"
            echo ""
            echo "Top-level bundle structure (for context):"
            ls -la .vercel/output/ 2>/dev/null || echo "(no .vercel/output)"
          fi
          echo "::endgroup::"
      - name: Deploy to Vercel
        id: deploy
        run: |
          set -euo pipefail
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
      - name: Post-deploy health check
        run: |
          set -euo pipefail
          echo "Waiting 15s for deployment to propagate..."
          sleep 15
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 10 "${{ steps.deploy.outputs.deploy_url }}" || echo "000")
          echo "Health check: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ] && [ "$STATUS" != "403" ]; then
            echo "::error::Health check failed with status $STATUS"
            exit 1
          fi
      - name: Verify env wiring via /api/health (KAN-175)
        env:
          VERCEL_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
        run: |
          set -euo pipefail
          # KAN-175: Cloudflare bot challenge blocks CI runner IPs from
          # reaching dev.checklyra.com directly (returns 403 + JS challenge
          # page). Solution: hit the Vercel deployment URL directly
          # (lyra-xxx.vercel.app) which isn't proxied through Cloudflare.
          # Bypass header travels intact when not going through Cloudflare.
          # Verified working 2026-05-05 after multiple iterations.
          #
          # Outcomes:
          #   200 + correct values → ::notice::, exit 0 (happy path)
          #   200 + WRONG values   → ::error::, exit 1 (real regression)
          #   non-2xx              → ::warning::, exit 0 (Vercel-side issue,
          #                          NOT a code regression)
          if [ -z "$VERCEL_BYPASS" ]; then
            echo "::warning::VERCEL_AUTOMATION_BYPASS secret not set; skipping dev health smoke."
            exit 0
          fi
          if [ -z "$DEPLOY_URL" ]; then
            echo "::warning::deploy_url output missing from prior step; skipping smoke."
            exit 0
          fi
          DEPLOY_URL_CLEAN="${DEPLOY_URL#https://}"
          DEPLOY_URL_CLEAN="${DEPLOY_URL_CLEAN#http://}"
          echo "Hitting: https://$DEPLOY_URL_CLEAN/api/health"
          RESPONSE=$(curl -s -H "x-vercel-protection-bypass: $VERCEL_BYPASS" -w "\n%{http_code}" --max-time 20 \
            "https://$DEPLOY_URL_CLEAN/api/health")
          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $STATUS"
          echo "Body: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Dev health smoke received HTTP $STATUS instead of 200. Skipping assertion."
            exit 0
          fi
          SITE_URL=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('siteUrl',''))")
          IS_BETA=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('isBetaDeploy',False))")
          if [ "$SITE_URL" != "https://dev.checklyra.com" ]; then
            echo "::error::Dev health: NEXT_PUBLIC_SITE_URL='$SITE_URL', expected 'https://dev.checklyra.com'."
            exit 1
          fi
          if [ "$IS_BETA" = "True" ]; then
            echo "::error::Dev health: isBetaDeploy is True — dev must NOT have the beta gate active."
            exit 1
          fi
          echo "::notice::Dev env wiring verified (siteUrl=$SITE_URL)"
