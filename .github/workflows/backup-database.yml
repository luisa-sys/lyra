name: Weekly Database Backup

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run pg_dump backup
        id: pgdump
        continue-on-error: true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL not set - skipping pg_dump"
            exit 1
          fi
          chmod +x scripts/backup-database.sh
          ./scripts/backup-database.sh ./backups

      - name: Fallback to REST API backup
        if: steps.pgdump.outcome == 'failure'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          chmod +x scripts/backup-database-api.sh
          ./scripts/backup-database-api.sh ./backups

      - name: Upload backup artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lyra-db-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90
