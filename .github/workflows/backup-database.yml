name: Weekly Database Backup

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install PostgreSQL 17 client
        run: |
          # Supabase runs Postgres 17 — pg_dump requires matching major version
          # BUGS-2: Default apt postgresql-client installs v16, causing version mismatch
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update && sudo apt-get install -y postgresql-client-17
          # Ensure v17 is found first on PATH (Ubuntu keeps v16 at /usr/bin/pg_dump)
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Run pg_dump backup
        id: pgdump
        continue-on-error: true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL not set - skipping pg_dump"
            exit 1
          fi
          chmod +x scripts/backup-database.sh
          ./scripts/backup-database.sh ./backups

      - name: Fallback to REST API backup
        if: steps.pgdump.outcome == 'failure'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          chmod +x scripts/backup-database-api.sh
          ./scripts/backup-database-api.sh ./backups

      - name: Upload backup artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lyra-db-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90

      - name: Upload to Cloudflare R2 immutable backup
        if: success() && env.R2_ACCESS_KEY_ID != ''
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ]; then
            echo "R2 credentials not configured — skipping immutable backup"
            exit 0
          fi
          # Install AWS CLI (S3-compatible with R2)
          pip install awscli --quiet
          # Configure for R2
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          echo "R2 endpoint: ${R2_ENDPOINT}"
          echo "R2 bucket: ${R2_BUCKET_NAME}"
          # Upload with timestamp key to avoid object lock conflicts on re-runs
          DATE=$(date -u +%Y-%m-%dT%H%M%SZ)
          for f in backups/*; do
            FILENAME=$(basename "$f")
            echo "Uploading $FILENAME to R2..."
            aws s3 cp "$f" "s3://${R2_BUCKET_NAME}/${DATE}/${FILENAME}" \
              --endpoint-url "$R2_ENDPOINT" \
              --no-progress || echo "⚠ Upload failed for $FILENAME (may already exist under bucket lock)"
          done
          echo "✅ Immutable backup uploaded to R2 (${R2_BUCKET_NAME}/${DATE}/)"
          echo "🔒 Bucket lock: 90-day retention — cannot be deleted"
