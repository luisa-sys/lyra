name: PR Checks

on:
  pull_request:
    branches: [develop, staging, main]

jobs:
  checks:
    name: PR Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run type check
        run: npm run type-check
      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: true
      - name: Run npm audit (high/critical vulnerabilities block PR)
        run: npm audit --audit-level=high
      - name: Check for lint/type bypasses without Jira reference
        run: |
          echo "Scanning for eslint-disable, ts-ignore, ts-nocheck, ts-expect-error..."
          VIOLATIONS=""
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            linenum=$(echo "$line" | cut -d: -f2)
            content=$(echo "$line" | cut -d: -f3-)
            # Check if the line contains a KAN- reference (tracked tech debt)
            if ! echo "$content" | grep -q "KAN-"; then
              VIOLATIONS="$VIOLATIONS\n  $file:$linenum:$content"
            fi
          done < <(grep -rn "eslint-disable\|@ts-ignore\|@ts-nocheck\|@ts-expect-error" src/ --include="*.ts" --include="*.tsx" || true)
          
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Found lint/type bypasses without Jira ticket reference:"
            echo -e "$VIOLATIONS"
            echo ""
            echo "Each bypass must include a KAN-XX reference (e.g. // eslint-disable-next-line -- KAN-99: reason)"
            exit 1
          else
            echo "No untracked lint/type bypasses found."
          fi
      - name: Check architecture doc freshness
        run: |
          # Get list of changed files in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
          
          # Check if any key files changed
          KEY_CHANGE=false
          echo "$CHANGED" | grep -qE "^(src/app/|src/middleware|supabase/migrations/|\.github/workflows/|public/\.well-known/|scripts/)" && KEY_CHANGE=true
          
          # If key files changed, check if ARCHITECTURE.md was also updated
          if [ "$KEY_CHANGE" = true ]; then
            if ! echo "$CHANGED" | grep -q "docs/ARCHITECTURE.md"; then
              echo "::warning::Key source files changed without updating docs/ARCHITECTURE.md. Please review if the architecture document needs updating."
            else
              echo "Architecture doc updated alongside source changes — good."
            fi
          else
            echo "No key architectural files changed — skipping check."
          fi