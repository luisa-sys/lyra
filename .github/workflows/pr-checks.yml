name: PR Checks

on:
  pull_request:
    branches: [develop, staging, main]

jobs:
  checks:
    name: PR Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run type check
        run: npm run type-check
      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: true
      - name: Check architecture doc freshness
        run: |
          # Get list of changed files in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
          
          # Check if any key files changed
          KEY_CHANGE=false
          echo "$CHANGED" | grep -qE "^(src/app/|src/middleware|supabase/migrations/|\.github/workflows/|public/\.well-known/|scripts/)" && KEY_CHANGE=true
          
          # If key files changed, check if ARCHITECTURE.md was also updated
          if [ "$KEY_CHANGE" = true ]; then
            if ! echo "$CHANGED" | grep -q "docs/ARCHITECTURE.md"; then
              echo "::warning::Key source files changed without updating docs/ARCHITECTURE.md. Please review if the architecture document needs updating."
            else
              echo "Architecture doc updated alongside source changes — good."
            fi
          else
            echo "No key architectural files changed — skipping check."
          fi