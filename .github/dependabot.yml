version: 2
updates:
  # npm deps target develop so they flow through the standard
  # develop → staging → main pipeline. Workflow-file bumps below
  # (github-actions ecosystem) still target main since workflow
  # changes only take effect once on main (CLAUDE.md gotcha #1).
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    # Group react/react-dom (+ @types) so they always bump together.
    # react-dom@X peer-depends on react@^X and package.json pins exact
    # versions — solo react-dom bumps fail install (see PR #91).
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
    commit-message:
      prefix: "ci"