<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — Lyra</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root {
        color-scheme: light;
      }
      html, body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
        background: #fafaf9;
        color: #2b2b2b;
      }
      main {
        max-width: 480px;
        margin: 64px auto;
        padding: 0 24px;
        text-align: center;
      }
      h1 {
        font-size: 26px;
        margin: 24px 0 12px;
      }
      p {
        color: #555;
        line-height: 1.5;
      }
      img {
        width: 96px;
        height: auto;
      }
      a {
        display: inline-block;
        margin-top: 24px;
        background: #5F7256;
        color: #fff;
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/lyra-icon-192.png" alt="Lyra" />
      <h1>You're offline</h1>
      <p>
        Lyra needs a connection for most pages — they're personalised to you.
      </p>
      <p>When you're back online, the page you were trying to reach will load normally.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
